name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install mkdocs-material mkdocs-awesome-pages-plugin ghp-import
      - run: mkdocs build --site-dir site/en/
      - run: mkdocs build --config-file mkdocs-nl.yml --site-dir site/nl/
      - run: mkdocs build --config-file mkdocs-es.yml --site-dir site/es/
      - run: mkdocs build --config-file mkdocs-fr.yml --site-dir site/fr/
      - run: mkdocs build --config-file mkdocs-de.yml --site-dir site/de/
      - run: mkdir -p site && echo '<meta http-equiv="refresh" content="0; url=/docs/en/">' > site/index.html
      - run: ghp-import -n -p -f site
