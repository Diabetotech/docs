site_name: Diabetotech
site_description: Open diabetes technology education — peer-reviewed
site_url: https://diabetotech.readthedocs.io

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md
  - CGM: cgm/index.md
  - Insulin Pumps: pumps/index.md
  - AID Systems: aid/index.md
  - Smart Pens: pens/index.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@diabetotech
    - icon: fontawesome/brands/github
      link: https://github.com/Diabetotech
