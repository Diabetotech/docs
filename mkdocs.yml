site_name: Diabetotech
site_description: Open diabetes technology education — peer-reviewed
site_url: https://diabetotech.readthedocs.io

theme:
  name: readthedocs
  highlightjs: true

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - CGM: en/cgm/
  - Insulin Pumps: en/pumps/
  - AID Systems: en/aid/
  - Smart Pens: en/pens/

plugins:
  - search
  - awesome-pages

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@diabetotech
    - icon: fontawesome/brands/github
      link: https://github.com/Diabetotech
