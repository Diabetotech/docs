site_name: Diabetotech
site_description: Open diabetes technology education — peer-reviewed
site_url: https://diabetotech.github.io/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  logo: assets/logo.png
  favicon: assets/logo.png

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

