site_name: Diabetotech — Deutsch
site_description: Offene Diabetes-Technologie-Ausbildung — von Experten geprüft
site_url: https://diabetotech.github.io/docs/de/

docs_dir: docs/de

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Zum Dunkelmodus wechseln
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Zum Hellmodus wechseln
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
  logo: assets/logo.png
  favicon: assets/logo.png

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages

