site_name: Diabetotech — Français
site_description: Education ouverte sur la technologie du diabete — revisee par les pairs
site_url: https://diabetotech.github.io/docs/fr/

docs_dir: docs/fr

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
  logo: assets/logo.png
  favicon: assets/logo.png

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages

